  screen: 'login',   // login | intro | answer | compare
  player: null,
  answers: { A:{}, B:{} },
  loading: false,
  saving: false,
  viewMode: 'card',
  cardIdx: 0,
  cardAnim: '',      // '' | 'exit' | 'enter'
  expandedCat: null,
  compareIdx: 0,
  loginPlayer: null,
  loginError: '',
  modalQ: null,
  modalVal: '',
};

function setState(patch){ Object.assign(state, patch); render(); }

// ── DB ────────────────────────────────────────────────────────────────────────
async function loadAnswers(){
  try {
    const { data, error } = await sb.from('answers').select('*');
    if(error) throw error;
    const a = { A:{}, B:{} };
    (data||[]).forEach(r => { if(a[r.player]) a[r.player][r.question_id] = r.answer; });
    setState({ answers:a });
  } catch(e) {
    console.error('Load error:', e);
    setState({ answers:{ A:{}, B:{} } });
  }
}

async function saveAnswer(qid, text){
  const p = state.player;
  const newAnswers = { ...state.answers, [p]: { ...state.answers[p], [qid]: text } };
  setState({ answers: newAnswers });
  await sb.from('answers').upsert({ player:p, question_id:qid, answer:text }, { onConflict:'player,question_id' });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function myAnswers(){ return state.answers[state.player] || {}; }
function pending(){ return QUESTIONS.filter(q => !myAnswers()[q.id]); }
function curCard(){ const p = pending(); return p[state.cardIdx % Math.max(p.length,1)]; }
function pct(){ return Math.round((Object.keys(myAnswers()).length / QUESTIONS.length)*100); }
function bothAnswered(){ return QUESTIONS.filter(q => state.answers.A?.[q.id] && state.answers.B?.[q.id]); }

function nextCard(skip=false){
  const cur = curCard();
  if(!skip && !myAnswers()[cur?.id]?.trim()) return;
  setState({ cardAnim:'exit' });
  setTimeout(()=>{
    setState({ cardIdx: state.cardIdx+1, cardAnim:'enter' });
    setTimeout(()=>setState({ cardAnim:'' }), 320);
  }, 260);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML = buildHTML();
  attachEvents();
}

function buildHTML(){
  if(state.loading) return `
    <div class="screen center">
      <div class="spinner"></div>
    </div>`;

  switch(state.screen){
    case 'login':   return buildLogin();
    case 'intro':   return buildIntro();
    case 'answer':  return buildAnswer();
    case 'compare': return buildCompare();
    default: return '';
  }
}

      <h1 class="serif" style="font-size:52px;font-weight:300;line-height:1.1;color:var(--cream);margin-bottom:8px">100<br><em>Preguntas</em></h1>
      <div class="divider"></div>
    </div>

    ${!p ? `
    <div class="fade-up" style="width:100%;max-width:300px;display:flex;flex-direction:column;gap:10px;animation-delay:0.1s">
      <p style="color:var(--muted);font-size:13px;margin-bottom:8px">¿Quién eres?</p>
      ${['A','B'].map(k=>`
        <button class="player-card" data-action="pick-player" data-player="${k}">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="width:36px;height:36px;border-radius:50%;background:${PLAYERS[k].color}18;border:1.5px solid ${PLAYERS[k].color}40;display:flex;align-items:center;justify-content:center">
              <span class="serif" style="font-size:16px;color:${PLAYERS[k].color}">${PLAYERS[k].name[0]}</span>
            </div>
            <span class="serif" style="font-size:18px;color:var(--cream);font-weight:400">${PLAYERS[k].name}</span>
          </div>
        </button>`).join('')}
    </div>` : `
    <div class="fade-up" style="width:100%;max-width:300px;animation-delay:0.1s">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:24px;justify-content:center">
        <div style="width:8px;height:8px;border-radius:50%;background:${pl.color};box-shadow:0 0 10px ${pl.glow}"></div>
        <span class="serif" style="font-size:18px;color:${pl.color};font-style:italic">${pl.name}</span>
      </div>
      <input type="password" id="pin-input" placeholder="contraseña" autocomplete="off"/>
      ${state.loginError ? `<p style="color:#f87171;font-size:12px;text-align:center;margin-top:10px">${state.loginError}</p>` : ''}
      <div style="display:flex;gap:10px;margin-top:16px">
        <button class="btn-ghost" data-action="back-login" style="flex:1">← Atrás</button>
        <button class="btn-gold" data-action="submit-login" style="flex:2">Entrar</button>
      </div>
    </div>`}
  </div>`;
}

// ── INTRO ─────────────────────────────────────────────────────────────────────
function buildIntro(){
  const both = bothAnswered();
  return `
  <div class="screen center fade-in">
    <div class="glow"></div>
    <div class="fade-up" style="text-align:center;margin-bottom:40px">
      <p style="font-size:11px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:16px;opacity:0.8">Corcho × Mara</p>
      <h1 class="serif" style="font-size:52px;font-weight:300;line-height:1.1;color:var(--cream);margin-bottom:8px">100<br><em>Preguntas</em></h1>
      <div class="divider"></div>
      <p style="color:var(--muted);font-size:14px;line-height:1.7;max-width:240px;margin:0 auto">Cada quien contesta por su lado.<br/>Se comparan juntos al final.</p>
    </div>

    <div class="fade-up" style="display:flex;gap:12px;margin-bottom:32px;animation-delay:0.1s">
      ${['A','B'].map(k=>{
        const count = Object.keys(state.answers[k]||{}).length;
        const pp = PLAYERS[k];
        return `
        <div style="min-width:120px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 14px;text-align:center">
          <div style="width:44px;height:44px;border-radius:50%;margin:0 auto 10px;background:${pp.color}15;border:1.5px solid ${pp.color}50;display:flex;align-items:center;justify-content:center">
            <span class="serif" style="font-size:18px;color:${pp.color}">${count}</span>
          </div>
          <p style="font-size:13px;color:var(--cream);font-weight:500;margin-bottom:3px">${pp.name}</p>
          <p style="font-size:11px;color:var(--muted)">${count}/100</p>
          <div class="prog-track" style="margin-top:10px">
            <div class="prog-fill" style="width:${(count/100)*100}%;background:linear-gradient(90deg,${pp.color},${pp.color}99)"></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="fade-up" style="width:100%;max-width:300px;display:flex;flex-direction:column;gap:10px;animation-delay:0.2s">
      <button class="btn-gold" data-action="go-answer" style="width:100%;padding:15px">Contestar →</button>
      ${both.length>0?`<button class="btn-ghost" data-action="go-compare" style="padding:13px;border-color:rgba(201,168,76,0.3);color:var(--gold)">✦ Revelar respuestas · ${both.length}</button>`:''}
      <button class="btn-ghost" data-action="logout" style="padding:11px;font-size:12px">Cerrar sesión</button>
    </div>
  </div>`;
}

// ── ANSWER ────────────────────────────────────────────────────────────────────
function buildAnswer(){
  const pl = PLAYERS[state.player];
  const p = pending();
  if(p.length===0) return `
    <div class="screen center fade-in">
      <p class="serif" style="font-size:48px;margin-bottom:16px">✦</p>
      <h2 class="serif" style="font-size:32px;font-weight:300;color:var(--cream);margin-bottom:12px">Listo, ${pl.name}</h2>
      <p style="color:var(--muted);font-size:14px;max-width:240px;line-height:1.7;margin-bottom:32px">
        Contestaste las 100. Espera a que ${state.player==='A'?PLAYERS.B.name:PLAYERS.A.name} termine para revelarlas juntos.
      </p>
      <button class="btn-gold" data-action="go-intro">Volver al inicio</button>
    </div>`;

  const cur = curCard();
  const cm = CAT_META[cur.cat]||{};
  const ma = myAnswers();
  const answered = ma[cur.id]?.trim();

  let cardStyle = '';
  if(state.cardAnim==='exit') cardStyle = 'animation:cardExit 0.26s ease forwards';
  if(state.cardAnim==='enter') cardStyle = 'animation:cardEnter 0.32s cubic-bezier(.22,.68,0,1.1) forwards';

  return `
  <div class="screen fade-in" style="background:var(--deep)">
    <div class="topbar">
      <button class="back-btn" data-action="go-intro">←</button>
      <div class="prog-track"><div class="prog-fill" style="width:${pct()}%"></div></div>
      <span style="font-size:11px;color:var(--muted);letter-spacing:0.5px">${Object.keys(ma).length} / 100</span>
      <div class="toggle-wrap">
        <button class="toggle-btn ${state.viewMode==='card'?'toggle-on':'toggle-off'}" data-action="set-view" data-view="card" style="background:${state.viewMode==='card'?pl.color:'transparent'};color:${state.viewMode==='card'?'var(--black)':'var(--muted)'}">Carta</button>
        <button class="toggle-btn ${state.viewMode==='list'?'toggle-on':'toggle-off'}" data-action="set-view" data-view="list" style="background:${state.viewMode==='list'?pl.color:'transparent'};color:${state.viewMode==='list'?'var(--black)':'var(--muted)'}">Lista</button>
      </div>
    </div>
    <div style="padding:0 20px 14px;display:flex;align-items:center;gap:8px">
      <div style="width:6px;height:6px;border-radius:50%;background:${pl.color};box-shadow:0 0 8px ${pl.color}"></div>
      <span class="serif" style="font-size:15px;color:var(--muted);font-style:italic">${pl.name}</span>
    </div>

    ${state.viewMode==='card'?`
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 20px 16px">
      <div style="width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:32px 28px;box-shadow:0 24px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.03);${cardStyle}">
        <span class="cat-pill" style="color:${cm.color};background:${cm.bg};border-color:${cm.border};margin-bottom:24px">
          ${cm.emoji} ${cm.label}
        </span>
        <p style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;font-family:var(--sans)">№ ${cur.id}</p>
        <p class="serif" style="font-size:22px;line-height:1.5;color:var(--cream);font-weight:400;margin-bottom:28px">${cur.text}</p>
        <textarea class="answer-input" id="card-answer" rows="3" placeholder="Tu respuesta...">${ma[cur.id]||''}</textarea>
        ${answered?`<p style="font-size:11px;color:${pl.color};margin-top:8px;letter-spacing:0.5px">✓ guardado</p>`:''}
      </div>
    </div>
    <div style="padding:0 20px 40px;display:flex;gap:10px">
      <button class="btn-ghost" data-action="skip-card" style="flex:1;padding:14px 0">Saltar</button>
      <button class="btn-gold" data-action="next-card" style="flex:2;padding:14px 0" ${!answered?'disabled':''}>Siguiente →</button>
    </div>`

    :`
    <div style="flex:1;overflow-y:auto;padding:0 16px 48px">
      ${CATEGORIES.map(cat=>{
        const catQs = p.filter(q=>q.cat===cat);
        if(!catQs.length) return '';
        const meta = CAT_META[cat]||{};
        const isOpen = state.expandedCat===cat;
        return `
        <div style="margin-bottom:8px">
          <button data-action="toggle-cat" data-cat="${cat}" style="width:100%;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;background:${isOpen?'var(--card)':'rgba(255,255,255,0.02)'};border:1px solid ${isOpen?meta.border:'var(--border)'};border-radius:${isOpen?'16px 16px 0 0':'16px'};cursor:pointer;transition:all 0.2s;font-family:var(--sans)">
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-size:18px">${meta.emoji}</span>
              <span class="serif" style="font-size:17px;color:var(--cream);font-weight:400">${meta.label}</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:11px;color:${meta.color};background:${meta.bg};border:1px solid ${meta.border};padding:2px 10px;border-radius:100px">${catQs.length}</span>
              <span style="color:var(--muted);font-size:12px">${isOpen?'▲':'▼'}</span>
            </div>
          </button>
          ${isOpen?`
          <div style="background:var(--card);border:1px solid ${meta.border};border-top:none;border-radius:0 0 16px 16px;padding:4px 18px 12px">
            ${catQs.map(q=>`
            <div class="list-item">
              <p class="serif" style="font-size:16px;line-height:1.55;color:var(--cream);font-weight:400;margin-bottom:10px">${q.text}</p>
              <button data-action="open-modal" data-qid="${q.id}" style="padding:6px 16px;background:${meta.bg};border:1px solid ${meta.border};border-radius:100px;font-size:12px;color:${meta.color};cursor:pointer;letter-spacing:0.3px;font-family:var(--sans)">
                ${ma[q.id]?'✓ Editar':'+ Contestar'}
              </button>
              ${ma[q.id]?`<p style="margin-top:8px;font-size:13px;color:var(--muted);font-style:italic;line-height:1.5">"${ma[q.id].length>90?ma[q.id].slice(0,90)+'…':ma[q.id]}"</p>`:''}
            </div>`).join('')}
          </div>`:''}
        </div>`;
      }).join('')}
    </div>`}

    ${state.modalQ?buildModal():''}
  </div>`;
}

function buildModal(){
  const q = QUESTIONS.find(x=>x.id===state.modalQ);
  if(!q) return '';
  const cm = CAT_META[q.cat]||{};
  const pl = PLAYERS[state.player];
  const existing = myAnswers()[q.id]||'';
  return `
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal-sheet">
      <div style="width:36px;height:3px;background:rgba(255,255,255,0.15);border-radius:2px;margin:0 auto 24px"></div>
      <span class="cat-pill" style="color:${cm.color};background:${cm.bg};border-color:${cm.border};margin-bottom:16px;display:inline-flex">${cm.emoji} ${cm.label}</span>
      <p class="serif" style="font-size:20px;line-height:1.55;color:var(--cream);margin-bottom:20px;font-weight:400">${q.text}</p>
      <textarea class="answer-input" id="modal-answer" rows="4" placeholder="Tu respuesta...">${existing}</textarea>
      <div style="display:flex;gap:10px;margin-top:16px">
        <button class="btn-ghost" data-action="close-modal" style="flex:1">Cancelar</button>
        <button class="btn-gold" data-action="save-modal" style="flex:2">Guardar</button>
      </div>
    </div>
  </div>`;
}

// ── COMPARE ───────────────────────────────────────────────────────────────────
function buildCompare(){
  const both = bothAnswered();
  if(!both.length) return `
    <div class="screen center fade-in">
      <p style="color:var(--muted);font-size:15px">Todavía no hay preguntas que ambos hayan respondido.</p>
      <button class="btn-ghost" data-action="go-intro" style="margin-top:24px">← Atrás</button>
    </div>`;

  const q = both[state.compareIdx];
  const cm = CAT_META[q.cat]||{};

  return `
  <div class="screen fade-in" style="background:var(--deep)">
    <div class="topbar">
      <button class="back-btn" data-action="go-intro">←</button>
      <div class="prog-track"><div class="prog-fill" style="width:${((state.compareIdx+1)/both.length)*100}%"></div></div>
      <span style="font-size:11px;color:var(--muted);letter-spacing:0.5px">${state.compareIdx+1} / ${both.length}</span>
    </div>

    <div style="flex:1;overflow-y:auto;padding:8px 20px 16px">
      <div style="max-width:440px;margin:0 auto">
        <div style="background:var(--card);border:1px solid ${cm.border||'var(--border)'};border-radius:20px;padding:22px;margin-bottom:16px">
          <span class="cat-pill" style="color:${cm.color};background:${cm.bg};border-color:${cm.border};margin-bottom:16px;display:inline-flex">${cm.emoji} ${cm.label}</span>
          <p style="font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:8px;font-family:var(--sans)">№ ${q.id}</p>
          <p class="serif" style="font-size:21px;line-height:1.55;color:var(--cream);font-weight:400;margin:0">${q.text}</p>
        </div>
        ${['A','B'].map(k=>{
          const pp = PLAYERS[k];
          return `
          <div class="compare-block" style="background:${pp.color}08;border-color:${pp.color}25">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
              <div style="width:8px;height:8px;border-radius:50%;background:${pp.color};box-shadow:0 0 10px ${pp.glow}"></div>
              <span class="serif" style="font-size:15px;color:${pp.color};font-style:italic">${pp.name}</span>
            </div>
            <p class="serif" style="font-size:17px;line-height:1.65;color:var(--cream);font-weight:400;margin:0">
              ${state.answers[k]?.[q.id]||'<span style="opacity:0.3;font-size:15px">Sin respuesta</span>'}
            </p>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div style="padding:8px 20px 40px;display:flex;gap:10px">
      <button class="btn-ghost" data-action="prev-compare" style="flex:1;padding:14px 0" ${state.compareIdx===0?'disabled':''}>← Anterior</button>
      <button class="btn-gold" data-action="next-compare" style="flex:2;padding:14px 0" ${state.compareIdx===both.length-1?'disabled':''}>Siguiente →</button>
    </div>
  </div>`;
}

// ── Events ────────────────────────────────────────────────────────────────────
function attachEvents(){
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click', handleAction);
  });

  // Card textarea auto-save
  const ca = document.getElementById('card-answer');
  if(ca){
    let t;
    ca.addEventListener('input', e=>{
      clearTimeout(t);
      const cur = curCard();
      if(cur) {
        state.answers[state.player] = { ...state.answers[state.player], [cur.id]: e.target.value };
        t = setTimeout(()=>saveAnswer(cur.id, e.target.value), 800);
        // update save indicator
        const ind = document.querySelector('[data-save-ind]');
      }
    });
  }

  // Modal backdrop click to close
  const mb = document.getElementById('modal-backdrop');
  if(mb) mb.addEventListener('click', e=>{ if(e.target===mb) setState({ modalQ:null, modalVal:'' }); });

  // Enter key on login
  const pi = document.getElementById('pin-input');
  if(pi) pi.addEventListener('keydown', e=>{ if(e.key==='Enter') handleAction({ target: document.querySelector('[data-action="submit-login"]') }); });
}

async function handleAction(e){
  const action = e.target.dataset.action;
  if(!action) return;

  switch(action){
    case 'pick-player':
      setState({ loginPlayer: e.target.dataset.player, loginError:'' });
      break;
    case 'back-login':
      setState({ loginPlayer:null, loginError:'' });
      break;
    case 'submit-login': {
      const val = document.getElementById('pin-input')?.value||'';
      const p = state.loginPlayer;
      if(val === PASSWORDS[p]){
        setState({ player:p, screen:'intro', loginError:'' });
        loadAnswers();
      } else {
        setState({ loginError:'Contraseña incorrecta' });
      }
      break;
    }
    case 'logout':
      setState({ screen:'login', player:null, loginPlayer:null, loginError:'' });
      break;
    case 'go-intro':
      setState({ screen:'intro' });
      break;
    case 'go-answer':
      setState({ screen:'answer', cardIdx:0, viewMode:'card' });
      break;
    case 'go-compare':
      setState({ screen:'compare', compareIdx:0 });
      break;
    case 'set-view':
      setState({ viewMode: e.target.dataset.view });
      break;
    case 'skip-card':
      nextCard(true);
      break;
    case 'next-card': {
      const cur = curCard();
      const val = document.getElementById('card-answer')?.value||'';
      if(val.trim()){
        await saveAnswer(cur.id, val);
        nextCard(false);
      }
      break;
    }
    case 'toggle-cat':
      setState({ expandedCat: state.expandedCat===e.target.dataset.cat ? null : e.target.dataset.cat });
      break;
    case 'open-modal': {
      const qid = parseInt(e.target.dataset.qid);
      setState({ modalQ: qid, modalVal: myAnswers()[qid]||'' });
      break;
    }
    case 'close-modal':
      setState({ modalQ:null, modalVal:'' });
      break;
    case 'save-modal': {
      const val = document.getElementById('modal-answer')?.value||'';
      if(val.trim()){
        await saveAnswer(state.modalQ, val);
        setState({ modalQ:null, modalVal:'' });
      }
      break;
    }
    case 'prev-compare':
      setState({ compareIdx: Math.max(0, state.compareIdx-1) });
      break;
    case 'next-compare':
      setState({ compareIdx: Math.min(bothAnswered().length-1, state.compareIdx+1) });
      break;
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
