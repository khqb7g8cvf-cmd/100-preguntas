// ── Supabase ──────────────────────────────────────────────────────────────────
const sb = supabase.createClient(SURL, SKEY);

// ── State ─────────────────────────────────────────────────────────────────────
// answers: { A: {1:'resp', 2:'resp'...}, B: {...} }
// currentQId: the EXACT question id being shown right now
let S = {
  screen: 'login',
  player: null,
  answers: {A:{}, B:{}},
  currentQId: null,   // always tracks exact question id, never an index
  anim: '',           // '' | 'out' | 'in'
  viewMode: 'card',
  expandedCat: null,
  compareIdx: 0,
  loginPlayer: null,
  loginError: '',
  modalQId: null,
};

function set(patch){ Object.assign(S, patch); render(); }

// ── DB ────────────────────────────────────────────────────────────────────────
async function dbLoad(){
  try {
    const { data } = await sb.from('answers').select('*');
    const a = {A:{}, B:{}};
    (data||[]).forEach(r => { if(a[r.player]) a[r.player][r.question_id] = r.answer; });
    // Set currentQId to first pending question after load
    const pending = firstPending(a[S.player]||{});
    set({ answers:a, currentQId: pending ? pending.id : null });
  } catch(e){ console.error(e); }
}

async function dbSave(qid, text){
  if(!text.trim()) return;
  // Update local silently
  if(!S.answers[S.player]) S.answers[S.player] = {};
  S.answers[S.player][qid] = text.trim();
  // Persist
  try {
    await sb.from('answers').upsert(
      { player:S.player, question_id:qid, answer:text.trim() },
      { onConflict:'player,question_id' }
    );
  } catch(e){ console.error(e); }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function myA(){ return S.answers[S.player]||{}; }
function firstPending(answered){ return QS.find(q => !answered[q.id]) || null; }
function pending(){ return QS.filter(q => !myA()[q.id]); }
function pct(){ return Math.round((Object.keys(myA()).length/100)*100); }
function bothA(){ return QS.filter(q => S.answers.A?.[q.id] && S.answers.B?.[q.id]); }
function getCurQ(){ return QS.find(q=>q.id===S.currentQId) || null; }

// ── Next question (strict: by id, not index) ──────────────────────────────────
function advance(skip){
  const cur = getCurQ();
  if(!cur) return;
  if(!skip && !myA()[cur.id]?.trim()) return;
  set({ anim:'out' });
  setTimeout(()=>{
    // Find next pending question AFTER current one by id
    const remaining = QS.filter(q => !myA()[q.id] && q.id !== cur.id);
    const next = remaining[0] || null;
    set({ currentQId: next ? next.id : null, anim:'in' });
    setTimeout(()=>set({ anim:'' }), 300);
  }, 230);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('app').innerHTML = html();
  bind();
}

function html(){
  switch(S.screen){
    case 'login':   return rLogin();
    case 'intro':   return rIntro();
    case 'answer':  return rAnswer();
    case 'compare': return rCompare();
    default: return '';
  }
}

// ── Event binding ─────────────────────────────────────────────────────────────
let saveTimer = null;

function bind(){
  // Delegation on app div
  document.getElementById('app').onclick = e => {
    let el = e.target;
    while(el && el.id !== 'app'){
      if(el.dataset && el.dataset.a) { act(el.dataset.a, el.dataset); return; }
      el = el.parentElement;
    }
  };

  // Textarea in card - safe autosave, never triggers re-render
  const ta = document.getElementById('ans-ta');
  if(ta){
    const qid = parseInt(ta.dataset.qid);
    ta.oninput = e => {
      clearTimeout(saveTimer);
      const val = e.target.value;
      // Update local state silently
      if(!S.answers[S.player]) S.answers[S.player] = {};
      S.answers[S.player][qid] = val;
      // Update UI elements directly without re-render
      const ind = document.getElementById('save-ind');
      const btn = document.getElementById('next-btn');
      if(ind){ ind.textContent = val.trim()?'✓ guardado':''; ind.style.opacity = val.trim()?'1':'0'; }
      if(btn) btn.disabled = !val.trim();
      // Debounced Supabase save
      saveTimer = setTimeout(()=>dbSave(qid, val), 1200);
    };
  }

  // Modal backdrop close
  const mb = document.getElementById('modal-back');
  if(mb) mb.onclick = e => { if(e.target===mb) set({modalQId:null}); };

  // Password enter key
  const pw = document.getElementById('pwd');
  if(pw) pw.onkeydown = e => { if(e.key==='Enter') act('login', {}); };
}

async function act(a, d){
  switch(a){
    case 'pick': set({loginPlayer:d.p, loginError:''}); break;
    case 'back': set({loginPlayer:null, loginError:''}); break;
    case 'login': {
      const v = document.getElementById('pwd')?.value||'';
      if(v===PWD[S.loginPlayer]){
        set({player:S.loginPlayer, screen:'intro', loginError:''});
        dbLoad();
      } else set({loginError:'Contraseña incorrecta'});
      break;
    }
    case 'logout': set({screen:'login',player:null,loginPlayer:null,loginError:'',currentQId:null}); break;
    case 'go-intro': set({screen:'intro'}); break;
    case 'go-answer': {
      const p = pending();
      set({screen:'answer', viewMode:'card', currentQId: p[0]?.id||null, expandedCat:null});
      break;
    }
    case 'go-compare': set({screen:'compare', compareIdx:0}); break;
    case 'view-card': set({viewMode:'card'}); break;
    case 'view-list': set({viewMode:'list'}); break;
    case 'skip': advance(true); break;
    case 'next': {
      const cur = getCurQ();
      if(!cur) break;
      // Save current textarea value first
      const ta = document.getElementById('ans-ta');
      if(ta && ta.value.trim()) await dbSave(cur.id, ta.value);
      advance(false);
      break;
    }
    case 'toggle-cat': set({expandedCat: S.expandedCat===d.cat?null:d.cat}); break;
    case 'open-modal': set({modalQId:parseInt(d.qid)}); break;
    case 'close-modal': set({modalQId:null}); break;
    case 'save-modal': {
      const v = document.getElementById('modal-ta')?.value||'';
      if(v.trim()){ await dbSave(S.modalQId, v); set({modalQId:null}); }
      break;
    }
    case 'prev-cmp': set({compareIdx:Math.max(0,S.compareIdx-1)}); break;
    case 'next-cmp': set({compareIdx:Math.min(bothA().length-1,S.compareIdx+1)}); break;
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
